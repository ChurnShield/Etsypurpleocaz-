    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Montserrat:wght@300;400;500;600;700;800&family=Great+Vibes&display=swap');
    :root { --bg:#F5F5F5; --bg-note:#F8F6F3; --card:#FFFFFF;
             --purple:#6B3E9E; --purple-lt:#9B59B6; --lavender:#A78BFA;
             --text:#2C2C2C; --dim:#999999; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:2250px; height:3000px; background:var(--bg);
           font-family:'Montserrat',sans-serif; overflow:hidden;
           color:var(--text); }
    .serif { font-family:'Playfair Display',serif; }
    .script { font-family:'Great Vibes',cursive; }
    .purple { color:var(--purple); }
    .purple-lt { color:var(--purple-lt); }
    .dim { color:var(--dim); }
    .white { color:#FFFFFF; }
    .divider { width:200px; height:3px; background:var(--purple);
                margin:20px auto; opacity:0.6; border-radius:2px; }
    
/* Preview: scale to fit browser window */
@media screen {
    html { height: 100vh; }
    body {
        transform-origin: top left;
        transform: scale(min(calc(100vw / 2250), calc(100vh / 3000)));
    }
}
</style>

              text-transform:uppercase; border-radius:6px; }
    .banner { position:absolute; bottom:0; left:0; right:0;
